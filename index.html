<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Step into the Multiverse of Portfolio — explore Dua Anas's front-end projects, hobbies and ideas across themed universes, then get in touch." />
    <meta name="theme-color" content="#08070f" />
    <title>Multiverse of Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- live domain: www.duaanas.com -->
    <link rel="canonical" href="https://www.duaanas.com/" />
    <link rel="alternate" hreflang="en" href="https://www.duaanas.com/" />
    <link rel="alternate" hreflang="x-default" href="https://www.duaanas.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Multiverse of Portfolio" />
    <meta property="og:description" content="Step into the Multiverse of Portfolio — explore Dua Anas's front-end projects, hobbies and ideas across themed universes, then get in touch." />
    <meta property="og:url" content="https://www.duaanas.com/" />
    <meta property="og:image" content="https://www.duaanas.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Multiverse of Portfolio" />
    <meta name="twitter:description" content="Step into the Multiverse of Portfolio — explore Dua Anas's front-end projects, hobbies and ideas across themed universes, then get in touch." />
    <meta name="twitter:image" content="https://www.duaanas.com/og.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Google Fonts loaded async (media swap) so the CSS never blocks first
         paint; every face uses display=swap, so text renders in fallbacks
         first. main.jsx flips media to 'all' once loaded — no inline JS, so
         the CSP can stay script-src 'self'. noscript keeps fonts for JS-off
         readers. -->
    <link
      data-async-fonts
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;0,900;1;800&family=Caveat:wght@400;600;700&display=swap"
      rel="stylesheet"
      media="print"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;0,900;1;800&family=Caveat:wght@400;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <!-- small local face used by the hub hero; the big Biolinum is deliberately
         not preloaded — it would fight the JS bundle for bandwidth -->
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/assets/aroma_vintage/AromaVintage-Regular.woff2" />
    <style>html, body { background: #08070f; }</style>
    <!-- structured data: the site + its one shared Person entity; pages add
         their own JSON-LD (ItemList, Blog, AboutPage) referencing #person. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://www.duaanas.com/#website",
          "url": "https://www.duaanas.com/",
          "name": "Multiverse of Portfolio",
          "description": "Step into the Multiverse of Portfolio — explore Dua Anas's front-end projects, hobbies and ideas across themed universes, then get in touch.",
          "publisher": { "@id": "https://www.duaanas.com/#person" }
        },
        {
          "@type": "Person",
          "@id": "https://www.duaanas.com/#person",
          "name": "Dua Anas",
          "url": "https://www.duaanas.com/",
          "jobTitle": "Front End Developer",
          "knowsAbout": ["JavaScript", "React", "CSS", "Node.js", "Front-end development"],
          "sameAs": [
            "https://github.com/cooleditingx",
            "https://www.linkedin.com/in/dua-anas/",
            "https://www.youtube.com/@DuAcodes"
          ]
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Static first-paint shell, replaced wholesale when React mounts.
           Two jobs: (1) the boot line + 00% bar paint before any JS, fixing
           FCP; (2) the PORTFOLIO title behind the opaque boot layer is the
           page's largest pre-interaction text, so LCP is recorded at first
           paint instead of after the bundle + typing animation. It must stay
           slightly larger than TitleCard's h1 (clamp 2.6rem/11vw/7.5rem) or a
           later, bigger paint would re-set LCP. -->
      <div aria-hidden="true">
        <h1 style="position:fixed;inset:0;z-index:1;margin:0;display:flex;align-items:center;justify-content:center;overflow:hidden;white-space:nowrap;background:#010103;color:#e8e6f0;font-family:'Space Grotesk',system-ui,sans-serif;font-weight:700;font-size:clamp(3.2rem,15vw,9.5rem);letter-spacing:-0.02em;line-height:1">PORTFOLIO</h1>
        <div style="position:fixed;inset:0;z-index:2;background:#010103;display:flex;align-items:center;justify-content:center">
          <div style="width:min(640px,82vw);font-family:'Space Mono',ui-monospace,Menlo,monospace;font-size:14px;line-height:1.5">
            <p style="margin:0;min-height:1.5em;color:#4ce0d2;opacity:.9"><span style="color:#8b5cf6">&gt;</span> INITIALIZING MULTIVERSE OS v2.2 ...</p>
            <p style="margin:1.5rem 0 0;color:#e8e6f0">LOADING ATOMS [□□□□□□□□□□□□□□] 00%</p>
          </div>
        </div>
      </div>
      <noscript>
        <p style="position:fixed;left:0;right:0;bottom:2rem;z-index:3;margin:0;text-align:center;font-family:'Space Mono',ui-monospace,Menlo,monospace;font-size:13px;color:#9d99b3">This multiverse needs JavaScript to open.</p>
      </noscript>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
